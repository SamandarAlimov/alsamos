apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: data
data:
  pgbouncer.ini: |
    [databases]
    alsamos = host=postgres.data.svc.cluster.local port=5432 dbname=alsamos

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = plain
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 100
    default_pool_size = 20
    min_pool_size = 2
    reserve_pool_size = 5
    server_reset_query = DISCARD ALL
    ignore_startup_parameters = extra_float_digits
    admin_users = postgres
    stats_users = postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: alpine:3.20
          imagePullPolicy: IfNotPresent
          ports:
            - name: pgbouncer
              containerPort: 6432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -ec
            - |
              apk add --no-cache pgbouncer postgresql-client
              addgroup -S pgbouncer || true
              adduser -S -D -H -h /tmp -s /bin/sh -G pgbouncer pgbouncer || true
              printf '"postgres" "%s"\n' "$POSTGRES_PASSWORD" > /etc/pgbouncer/userlist.txt
              chown pgbouncer:pgbouncer /etc/pgbouncer/userlist.txt
              exec su pgbouncer -c 'pgbouncer /etc/pgbouncer/pgbouncer.ini'
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: data
spec:
  selector:
    app: pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: pgbouncer
  type: ClusterIP
