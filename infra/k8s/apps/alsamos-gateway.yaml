apiVersion: apps/v1
kind: Deployment
metadata:
  name: alsamos-gateway
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alsamos-gateway
  template:
    metadata:
      labels:
        app: alsamos-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/samandaralimov/alsamos-alsamos-gateway:PLACEHOLDER_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ALSAMOS_ID_ISSUER
              value: https://id.alsamos.com
            - name: ALSAMOS_ID_JWKS_URL
              value: https://id.alsamos.com/jwks.json
            - name: SUPABASE_ISSUER
              value: https://mbhjganbihamoiqmankv.supabase.co/auth/v1
            - name: SUPABASE_JWKS_URL
              value: https://mbhjganbihamoiqmankv.supabase.co/auth/v1/.well-known/jwks.json
            - name: SUPABASE_URL
              value: https://mbhjganbihamoiqmankv.supabase.co
            - name: SUPABASE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-supabase
                  key: SUPABASE_PUBLISHABLE_KEY
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resend-secret
                  key: RESEND_API_KEY
            - name: RESEND_FROM
              value: Alsamos <no-reply@alsamos.com>
            - name: INBOUND_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-inbound-secret
                  key: INBOUND_SHARED_SECRET
            - name: SOCIAL_URL
              value: http://social-web.apps.svc.cluster.local
            - name: MAIL_URL
              value: http://mail-web.apps.svc.cluster.local
            - name: ACCOUNTS_URL
              value: http://accounts-web.apps.svc.cluster.local
            - name: AI_URL
              value: http://ai-gateway.apps.svc.cluster.local:8000
            - name: REDIS_ADDR
              value: redis-0.redis.data.svc.cluster.local:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            - name: RATE_LIMIT_PER_MINUTE
              value: "100"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: alsamos-gateway
  namespace: apps
spec:
  selector:
    app: alsamos-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alsamos-gateway
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.alsamos.com
      secretName: api-alsamos-com-tls
  rules:
    - host: api.alsamos.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alsamos-gateway
                port:
                  number: 8080
