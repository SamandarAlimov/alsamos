name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - "alsamos-web/**"
      - "apps/**"
      - "services/**"
      - ".github/workflows/build-and-push.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: social-web
            context: alsamos-web
          - name: mail-web
            context: apps/mail
          - name: accounts-web
            context: apps/accounts
          - name: ai-gateway
            context: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/alsamos-${{ matrix.name }}:${{ github.sha }}
