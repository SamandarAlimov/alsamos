name: Build and Push Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "alsamos-web/**"
      - "apps/**"
      - "infra/k8s/apps/frontend-apps.yaml"
      - "services/**"
      - ".github/workflows/build-and-push.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: social-web
            context: .
          - name: mail-web
            context: https://github.com/SamandarAlimov/mail.git#main
          - name: accounts-web
            context: https://github.com/SamandarAlimov/accounts.git#main
          - name: ai-gateway
            context: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/samandaralimov/alsamos-${{ matrix.name }}:${{ github.sha }}
          build-args: |
            VITE_SUPABASE_URL=https://mbhjganbihamoiqmankv.supabase.co
            VITE_SUPABASE_PROJECT_ID=mbhjganbihamoiqmankv
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "${{ secrets.ORACLE_SSH_KEY }}" > "$HOME/.ssh/alsamos"
          chmod 600 "$HOME/.ssh/alsamos"
          ssh-keyscan -H 92.4.76.166 >> "$HOME/.ssh/known_hosts"
      - name: Roll out frontends
        run: |
          mkdir -p /tmp/alsamos-k8s
          cp infra/k8s/apps/frontend-apps.yaml /tmp/alsamos-k8s/frontend-apps.yaml
          sed -i "s/PLACEHOLDER_SHA/${GITHUB_SHA}/g" /tmp/alsamos-k8s/frontend-apps.yaml
          scp -i "$HOME/.ssh/alsamos" /tmp/alsamos-k8s/frontend-apps.yaml ubuntu@92.4.76.166:/tmp/alsamos-frontend-apps.yaml
          ssh -i "$HOME/.ssh/alsamos" ubuntu@92.4.76.166 "
            sudo k3s kubectl -n apps create secret docker-registry ghcr-pull \
              --docker-server=ghcr.io \
              --docker-username='${{ github.actor }}' \
              --docker-password='${{ github.token }}' \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f - &&
            sudo k3s kubectl apply -f /tmp/alsamos-frontend-apps.yaml &&
            sudo k3s kubectl -n apps rollout status deployment/social-web --timeout=180s &&
            sudo k3s kubectl -n apps rollout status deployment/accounts-web --timeout=180s &&
            sudo k3s kubectl -n apps rollout status deployment/mail-web --timeout=180s
          "
