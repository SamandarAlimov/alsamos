name: Deploy to K3s

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.K3S_KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Apply manifests
        run: |
          kubectl apply -f infra/k8s/data-stack.yaml
          kubectl apply -f infra/k8s/cert-manager-issuers.yaml
          kubectl apply -f infra/k8s/postgres-backup-cronjob.yaml
          kubectl apply -f infra/k8s/apps/
